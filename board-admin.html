<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掲示板 管理者画面 | 神村電機工業</title>
<style>
:root{
  --bg:#f0ede8;--surface:#fff;--surface2:#f8f6f2;--border:#e0d9cf;--border2:#ccc3b7;
  --text1:#1c1a17;--text2:#6b6560;--text3:#9b9590;
  --accent:#1b4f72;--accent-l:#eaf1f8;--accent-d:#143d58;
  --green:#1e6b45;--green-l:#e8f5ee;--amber:#8a5c0a;--amber-l:#fdf3e0;
  --red:#b03030;--red-l:#fbeaea;--purple:#7b5ea7;--purple-l:#f2edf8;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 .5px 1px rgba(0,0,0,.05);
  --radius:12px;--radius-s:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;}
.screen{display:none;}.screen.active{display:block;}

/* login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);padding:36px 32px;width:100%;max-width:380px;}
.login-logo{font-size:12px;color:var(--text3);letter-spacing:.08em;margin-bottom:4px;}
.login-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-s);padding:10px 12px;font-size:14px;font-family:inherit;background:var(--surface2);outline:none;color:var(--text1);margin-bottom:14px;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);background:white;}
.form-textarea{min-height:110px;resize:vertical;line-height:1.7;margin-bottom:0;}
.primary-btn{width:100%;padding:13px;background:var(--accent);color:white;border:none;border-radius:30px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.03em;margin-top:4px;}
.primary-btn:active{background:var(--accent-d);}
.primary-btn:disabled{opacity:.6;cursor:not-allowed;}
.err-msg{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* admin layout */
.admin-header{background:var(--accent-d);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.admin-header-title{font-size:15px;font-weight:700;}
.admin-header-sub{font-size:11px;opacity:.7;margin-top:1px;}
.logout-btn{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;}
.admin-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:90;overflow-x:auto;scrollbar-width:none;}
.admin-tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:12px 16px;font-size:13px;font-weight:500;border:none;background:transparent;cursor:pointer;font-family:inherit;color:var(--text2);border-bottom:2.5px solid transparent;white-space:nowrap;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.tab-badge{display:inline-block;background:var(--red);color:white;font-size:10px;font-weight:700;border-radius:10px;padding:1px 5px;margin-left:4px;vertical-align:middle;}

/* post cards */
.section-wrap{padding:16px;display:flex;flex-direction:column;gap:8px;max-width:800px;margin:0 auto;}
.acard{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);}
.acard-top{display:flex;align-items:center;gap:8px;padding:10px 14px 6px;}
.atag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.04em;}
.tag-notice{background:var(--accent-l);color:var(--accent);}
.tag-report{background:var(--purple-l);color:var(--purple);}
.tag-event{background:var(--amber-l);color:var(--amber);}
.tag-biz{background:var(--green-l);color:var(--green);}
.tag-useful{background:#fde8f5;color:#b5388a;}
.tag-other{background:#f0f0f0;color:#555555;}
.acard-title{font-size:14px;font-weight:600;padding:0 14px 5px;line-height:1.4;}
.acard-body{font-size:12px;color:var(--text2);padding:0 14px 8px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.acard-meta{font-size:11px;color:var(--text3);padding:0 14px 8px;}
.acard-foot{display:flex;gap:8px;padding:8px 14px;border-top:1px solid var(--border);background:var(--surface2);border-radius:0 0 var(--radius) var(--radius);flex-wrap:wrap;}
.acard-foot button{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid;cursor:pointer;font-family:inherit;background:white;}
.btn-del{color:var(--red);border-color:var(--red);}
.btn-del:active{background:var(--red-l);}
.btn-edit{color:var(--accent);border-color:var(--accent);}
.btn-edit:active{background:var(--accent-l);}
.btn-dm{color:var(--green);border-color:var(--green);margin-left:auto;}
.btn-dm:active{background:var(--green-l);}

/* user cards */
.user-filter{display:flex;gap:6px;padding:12px 16px 6px;overflow-x:auto;scrollbar-width:none;max-width:800px;margin:0 auto;}
.user-filter::-webkit-scrollbar{display:none;}
.uf-btn{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.uf-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:700;}
.user-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.user-card.pending{border-color:var(--amber);box-shadow:0 0 0 1.5px var(--amber),var(--shadow);}
.user-info{display:flex;align-items:center;gap:12px;padding:12px 14px;}
.user-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:white;flex-shrink:0;}
.user-name{font-size:14px;font-weight:700;}
.user-detail{font-size:12px;color:var(--text2);margin-top:2px;}
.user-status-badge{margin-left:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.st-approved{background:var(--green-l);color:var(--green);}
.st-pending{background:var(--amber-l);color:var(--amber);}
.st-rejected{background:var(--red-l);color:var(--red);}
.user-actions{display:flex;gap:8px;padding:8px 14px;border-top:1px solid var(--border);background:var(--surface2);}
.user-actions button{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid;cursor:pointer;font-family:inherit;}
.btn-approve{background:var(--green-l);color:var(--green);border-color:var(--green);}
.btn-approve:active{background:var(--green);color:white;}
.btn-reject{background:var(--red-l);color:var(--red);border-color:var(--red);}
.btn-reject:active{background:var(--red);color:white;}
.btn-revoke{background:white;color:var(--text2);border-color:var(--border2);}

/* new post form */
.form-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow);}
.form-title{font-size:16px;font-weight:700;margin-bottom:20px;}
.form-row{margin-bottom:16px;}
.form-row-label{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;display:block;}
.cat-row{display:flex;gap:6px;flex-wrap:wrap;}
.csel{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text2);}
.csel.sel-notice{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.csel.sel-report{background:var(--purple-l);border-color:var(--purple);color:var(--purple);}
.csel.sel-event{background:var(--amber-l);border-color:var(--amber);color:var(--amber);}
.csel.sel-biz{background:var(--green-l);border-color:var(--green);color:var(--green);}
.csel.sel-useful{background:#fde8f5;border-color:#b5388a;color:#b5388a;}
.csel.sel-other{background:#f0f0f0;border-color:#555555;color:#555555;}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius-s);padding:18px;text-align:center;cursor:pointer;background:var(--surface2);transition:all .15s;}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-l);}
.upload-zone input{display:none;}
.file-rows{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.file-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-s);padding:8px 10px;}
.file-row-name{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-row-size{font-size:11px;color:var(--text3);}
.file-rm{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;}
.pin-row{display:flex;align-items:center;gap:8px;}
.pin-row input{width:17px;height:17px;accent-color:var(--amber);}
.pin-row label{font-size:13px;color:var(--text2);cursor:pointer;}

/* settings tab */
.settings-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px;}
.settings-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.settings-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;}
.settings-section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.settings-section:last-child{border-bottom:none;margin-bottom:0;}
.settings-section-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.settings-status{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;}
.st-set{background:var(--green-l);color:var(--green);}
.st-unset{background:var(--border);color:var(--text3);}
.settings-save-btn{padding:8px 22px;background:var(--accent);color:white;border:none;border-radius:20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px;}
.settings-save-btn:active{background:var(--accent-d);}
.settings-clear-btn{padding:7px 16px;background:white;color:var(--red);border:1.5px solid var(--red);border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:10px;margin-left:8px;}
.howto-step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.howto-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.howto-text{font-size:12px;color:var(--text2);line-height:1.65;}

/* DM panel */
.dm-post-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-s);overflow:hidden;margin-bottom:12px;}
.dm-post-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.dm-post-item:last-child{border-bottom:none;}
.dm-post-item:hover{background:var(--accent-l);}
.dm-post-item.active{background:var(--accent);color:white;}
.dm-post-item.active .dm-sub{color:rgba(255,255,255,.7);}
.dm-pname{flex:1;font-size:13px;font-weight:600;}
.dm-sub{font-size:11px;color:var(--text3);}
.dm-win{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.dm-win-head{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
.dm-user-tabs{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2);overflow-x:auto;scrollbar-width:none;}
.dm-user-tabs::-webkit-scrollbar{display:none;}
.dm-utab{flex-shrink:0;padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;cursor:pointer;font-family:inherit;color:var(--text2);}
.dm-utab.active{background:var(--accent);border-color:var(--accent);color:white;}
.dm-thread{padding:12px;display:flex;flex-direction:column;gap:8px;min-height:100px;max-height:320px;overflow-y:auto;}
.dm-bbl{max-width:78%;}
.dm-bbl.user{align-self:flex-start;}
.dm-bbl.admin{align-self:flex-end;}
.dm-bbl-who{font-size:10px;color:var(--text3);margin-bottom:2px;}
.dm-bbl-text{padding:8px 11px;border-radius:12px;font-size:13px;line-height:1.55;}
.dm-bbl.user .dm-bbl-text{background:var(--surface2);border:1px solid var(--border);border-radius:12px 12px 12px 4px;}
.dm-bbl.admin .dm-bbl-text{background:var(--accent);color:white;border-radius:12px 12px 4px 12px;}
.dm-bbl-time{font-size:10px;color:var(--text3);margin-top:3px;}
.dm-bbl.admin .dm-bbl-time{text-align:right;}
.dm-reply-row{display:flex;gap:8px;align-items:flex-end;padding:10px 12px;border-top:1px solid var(--border);}
.dm-reply-input{flex:1;border:1.5px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;font-family:inherit;background:var(--surface2);outline:none;color:var(--text1);resize:none;}
.dm-reply-input:focus{border-color:var(--accent);background:white;}
.dm-reply-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);color:white;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dm-reply-btn:disabled{opacity:.5;cursor:not-allowed;}
.empty-state{text-align:center;color:var(--text3);font-size:13px;padding:40px 20px;}
.loading-msg{text-align:center;color:var(--text3);font-size:13px;padding:30px 20px;}
</style>
</head>
<body>

<!-- ① Login -->
<div class="screen active" id="screenLogin">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">神村電機工業株式会社</div>
      <div class="login-title">掲示板 管理ログイン</div>
      <div class="login-sub">管理者・投稿権限のある方専用の画面です。</div>
      <label class="form-label">メールアドレス</label>
      <input class="form-input" id="aEmail" type="email" placeholder="管理者メールアドレス">
      <label class="form-label">パスワード</label>
      <input class="form-input" id="aPw" type="password" placeholder="••••••••">
      <button class="primary-btn" id="aLoginBtn" onclick="doAdminLogin()">ログイン</button>
      <div class="err-msg" id="aErr"></div>
    </div>
  </div>
</div>

<!-- ② Admin UI -->
<div class="screen" id="screenAdmin">
  <div class="admin-header">
    <div><div class="admin-header-title">掲示板 管理者画面</div><div class="admin-header-sub">神村電機工業株式会社 総務・川島</div></div>
    <button class="logout-btn" onclick="doAdminLogout()">ログアウト</button>
  </div>
  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="posts" onclick="switchTab(this)">投稿一覧</button>
    <button class="tab-btn" data-tab="new" onclick="switchTab(this)">新規投稿</button>
    <button class="tab-btn" data-tab="users" onclick="switchTab(this)">社員承認 <span class="tab-badge" id="userBadge" style="display:none;">0</span></button>
    <button class="tab-btn" data-tab="dms" onclick="switchTab(this)">問い合わせ <span class="tab-badge" id="dmBadge" style="display:none;">0</span></button>
    <button class="tab-btn" data-tab="settings" onclick="switchTab(this)">⚙ M365設定</button>
  </div>
  <div id="tabPosts"><div class="section-wrap" id="postList"><div class="loading-msg">読み込み中...</div></div></div>
  <div id="tabNew" style="display:none;"><div class="section-wrap"><div class="form-card" id="newPostForm"></div></div></div>
  <div id="tabUsers" style="display:none;"><div class="user-filter" id="userFilter"><button class="uf-btn active" data-uf="all" onclick="setUF(this)">すべて</button><button class="uf-btn" data-uf="pending" onclick="setUF(this)">承認待ち</button><button class="uf-btn" data-uf="approved" onclick="setUF(this)">承認済み</button><button class="uf-btn" data-uf="rejected" onclick="setUF(this)">否認</button></div><div class="section-wrap" id="userList"></div></div>
  <div id="tabDms" style="display:none;"><div class="section-wrap"><div id="dmPanel"></div></div></div>
  <div id="tabSettings" style="display:none;"><div class="section-wrap" id="settingsPanel"></div></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* ============================================================
   🔧 FIREBASE CONFIG
   board-viewer.html と同じ値を貼り付けてください
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCblJ4SJEZhfA42sKAm4kyAwile0XAH-QE",
  authDomain: "kamimura-board.firebaseapp.com",
  projectId: "kamimura-board",
  storageBucket: "kamimura-board.firebasestorage.app",
  messagingSenderId: "301008392037",
  appId: "1:301008392037:web:3b4543e2b414849aee5b8c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

/* ─── state ─── */
let adminUser   = null;
let selCat      = 'notice';
let ufState     = 'all';
let fileEntries = [];  // {name, url, size}
let bnEntries   = [];  // {label, date, url}
let activeDmPost   = null;
let activeDmUserId = null;
let editingPostId  = null;   // 編集中の投稿ID（nullなら新規）
let myRole         = 'admin';// 'admin' | 'poster'

/* ─── カテゴリ（Firestore config/board で管理）─── */
const DEFAULT_CATS = [
  {id:'notice', label:'お知らせ',      color:'#1b4f72'},
  {id:'report', label:'社内報',        color:'#7b5ea7'},
  {id:'event',  label:'行事・イベント', color:'#8a5c0a'},
  {id:'biz',    label:'業務連絡',      color:'#1e6b45'},
  {id:'useful', label:'お役立ち情報',   color:'#b5388a'},
  {id:'other',  label:'その他',        color:'#555555'},
];
const CAT_SWATCHES = ['#1b4f72','#1e6b45','#8a5c0a','#7b5ea7','#b5388a','#b03030','#0e7490','#555555'];
let CATEGORIES   = DEFAULT_CATS.slice();
let CATMAP       = {};
const DEPTS = ['1G','2G','3G','技術G','品質保証G','営業G','管理G','取締役会'];

function rebuildCatMaps(){ CATMAP={}; CATEGORIES.forEach(c=>CATMAP[c.id]=c); }
rebuildCatMaps();
function catLabel(id){ return CATMAP[id]?.label || id || 'その他'; }
function catColor(id){ return CATMAP[id]?.color || '#555555'; }
function catStyle(id){ const c=catColor(id); return `background:${c}22;color:${c};`; }
// 既存コードとの互換用（ラベル参照のみ残す）
const TLBL = new Proxy({}, { get:(_,k)=>catLabel(k) });

async function loadConfig(seedIfAdmin){
  try{
    const ref  = db.collection('config').doc('board');
    const snap = await ref.get();
    if (snap.exists){
      const d = snap.data();
      if (Array.isArray(d.categories) && d.categories.length) CATEGORIES = d.categories;
    } else if (seedIfAdmin){
      await ref.set({ categories: DEFAULT_CATS });
      CATEGORIES = DEFAULT_CATS.slice();
    }
    rebuildCatMaps();
  }catch(e){ console.warn('config読み込みエラー:', e); }
}

const AVCOLS = ['#1b4f72','#1e6b45','#8a5c0a','#7b5ea7','#b03030'];

const $    = id => document.getElementById(id);
const v    = id => $(id)?.value?.trim()||'';
const esc  = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fmtTs(ts) { if(!ts)return''; const d=ts.toDate?ts.toDate():new Date(ts); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
function nowStr() { const d=new Date(); return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function avColor(name) { let h=0; for(let c of name)h=(h*31+c.charCodeAt(0))%AVCOLS.length; return AVCOLS[Math.abs(h)]; }

function showErr(id,msg){const el=$(id);el.textContent=msg;el.style.display='block';}
function hideErr(id){const el=$(id);if(el){el.textContent='';el.style.display='none';}}

/* ─── auth state ─── */
auth.onAuthStateChanged(async user => {
  if (!user) { switchScreen('screenLogin'); return; }
  try {
    const snap = await db.collection('users').doc(user.uid).get();
    if (!snap.exists) { await auth.signOut(); showErr('aErr','ユーザー情報が見つかりません'); return; }
    const u = snap.data();
    const isFullAdmin = u.isAdmin === true;
    await loadConfig(isFullAdmin);
    const postDepts = Array.isArray(u.postDepts) ? u.postDepts : [];
    const isPoster = !isFullAdmin && u.status === 'approved' && u.canPost === true && postDepts.length > 0;
    if (!isFullAdmin && !isPoster) {
      await auth.signOut();
      showErr('aErr','この画面を利用する権限がありません');
      return;
    }
    adminUser = { uid: user.uid, ...u };
    myRole = isFullAdmin ? 'admin' : 'poster';
    applyRoleUI();
    switchScreen('screenAdmin');
    loadPostList();
    if (myRole === 'admin') updateBadges();
  } catch(e) { console.error(e); showErr('aErr', e.message); await auth.signOut(); }
});

/* ─── badges ─── */
async function updateBadges() {
  const uSnap = await db.collection('users').where('status','==','pending').get();
  const ub=$('userBadge'); ub.textContent=uSnap.size; ub.style.display=uSnap.size>0?'inline-block':'none';

  // 未返信カウント（存在する投稿に紐づくスレッドのみ）
  const [tSnap, pSnap] = await Promise.all([
    db.collection('threads').get(),
    db.collection('posts').get()
  ]);
  const existingPostIds = new Set(pSnap.docs.map(d=>d.id));
  const unreadCount = tSnap.docs.filter(d=>{
    const data = d.data();
    const msgs = data.messages||[];
    // 対応する投稿が存在しない場合は除外
    if (!existingPostIds.has(data.postId)) return false;
    // 解決済みフラグがあれば除外
    if (data.resolved) return false;
    // メッセージが空は除外
    if (!msgs.length) return false;
    // ユーザーからのメッセージが1件もない場合は除外
    const userMsgs = msgs.filter(m=>m.from==='user');
    if (!userMsgs.length) return false;
    // 最後のメッセージがユーザーからの場合 = 未返信
    const lastMsg = msgs[msgs.length-1];
    return lastMsg.from === 'user';
  }).length;
  const db2=$('dmBadge'); db2.textContent=unreadCount; db2.style.display=unreadCount>0?'inline-block':'none';
}

/* ─── post list ─── */
let _postListenerUnsubscribe = null;

async function loadPostList() {
  $('postList').innerHTML='<div class="loading-msg">読み込み中...</div>';
  if (_postListenerUnsubscribe) { _postListenerUnsubscribe(); _postListenerUnsubscribe = null; }
  try {
    let approvedUsers = [];
    if (myRole==='admin') {
      const userSnap = await db.collection('users').where('status','==','approved').get();
      approvedUsers = userSnap.docs.map(d=>({uid:d.id,...d.data()}));
    }
    const totalUsers = approvedUsers.length;

    _postListenerUnsubscribe = db.collection('posts').orderBy('createdAt','desc')
      .onSnapshot(postSnap => {
        let posts = postSnap.docs.map(d=>({id:d.id,...d.data()}));
        // 投稿モードの人は、自分が関係する投稿だけ表示（全社 or 割当部署 or 自分の投稿）
        if (myRole !== 'admin') {
          const mine = adminUser.postDepts||[];
          posts = posts.filter(p => !p.targetDept || mine.includes(p.targetDept) || p.authorUid===adminUser.uid);
        }
        posts.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
        if (!posts.length){$('postList').innerHTML='<div class="empty-state">投稿がありません</div>';return;}
        $('postList').innerHTML=posts.map(p=>{
          const readBy = p.readBy||[];
          const readCount = readBy.length;
          const unreadUsers = approvedUsers.filter(u=>!readBy.includes(u.uid));
          const readPct = totalUsers>0 ? Math.round(readCount/totalUsers*100) : 0;
          const isAdmin = myRole==='admin';
          const isOwner = p.authorUid && p.authorUid===adminUser.uid;
          const canEdit = isAdmin || isOwner;
          const authorLabel = p.authorName ? `${esc(p.authorName)}${p.authorDept?`（${esc(p.authorDept)}）`:''}` : '総務（管理者）';
          const tgtBadge = p.targetDept
            ? `<span class="atag" style="background:var(--accent-l);color:var(--accent);">▶ ${esc(p.targetDept)}向け</span>`
            : `<span class="atag" style="background:var(--surface2);color:var(--text2);">全社</span>`;
          return `
          <div class="acard">
            <div class="acard-top">
              <span class="atag" style="${catStyle(p.cat)}">${esc(catLabel(p.cat))}</span>
              ${tgtBadge}
              ${p.pinned?`<span style="font-size:12px">📌</span>`:''}
              <span style="font-size:11px;color:var(--text3);margin-left:auto;">${fmtTs(p.createdAt)}${p.updatedAt?' ・編集済':''}</span>
            </div>
            <div class="acard-title">${esc(p.title)}</div>
            <div class="acard-body">${esc((p.body||'').replace(/\n/g,' '))}</div>
            <div class="acard-meta">投稿者：${authorLabel}${(p.files||[]).length?`　📎 ${p.files.map(f=>esc(f.name)).join('・')}`:''}${(p.backNumbers||[]).length?`　📚 バックナンバー${p.backNumbers.length}件`:''}</div>
            ${isAdmin?`
            <div style="padding:8px 14px;border-top:1px solid var(--border);">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
                <span style="font-size:11px;font-weight:700;color:var(--text2);">既読状況</span>
                <span style="font-size:11px;color:var(--text2);">${readCount}／${totalUsers}人（${readPct}%）</span>
              </div>
              <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden;">
                <div style="background:var(--green);height:100%;width:${readPct}%;border-radius:4px;"></div>
              </div>
              ${unreadUsers.length>0?`
              <div style="margin-top:6px;">
                <span style="font-size:10px;color:var(--text3);">未読：</span>
                ${unreadUsers.map(u=>`<span style="font-size:10px;background:var(--red-l);color:var(--red);padding:1px 6px;border-radius:10px;margin:2px 2px 0;display:inline-block;">${esc(u.name)}</span>`).join('')}
              </div>`:'<div style="margin-top:4px;font-size:10px;color:var(--green);">✓ 全員既読</div>'}
            </div>`:''}
            <div class="acard-foot">
              ${canEdit?`<button class="btn-edit" onclick="startEditPost('${p.id}')">✎ 編集</button>`:''}
              ${canEdit?`<button class="btn-del" onclick="deletePost('${p.id}')">削除</button>`:''}
              ${isAdmin?`<button class="btn-dm"  onclick="goToDM('${p.id}')">問い合わせを見る</button>`:''}
            </div>
          </div>`;
        }).join('');
      }, err => {
        $('postList').innerHTML=`<div class="empty-state">読み込みエラー: ${err.message}</div>`;
      });
  } catch(e) { $('postList').innerHTML=`<div class="empty-state">読み込みエラー: ${e.message}</div>`; }
}

async function addCategory() {
  const label = v('newCatLabel');
  if (!label) return alert('カテゴリ名を入力してください');
  if (CATEGORIES.some(c=>c.label===label)) return alert('同じ名前のカテゴリが既にあります');
  const id = 'c'+Date.now().toString(36);
  CATEGORIES = [...CATEGORIES, {id, label, color:newCatColor}];
  rebuildCatMaps();
  try {
    await saveCategories();
    renderNewPostForm();
  } catch(e) { alert('保存に失敗しました: '+e.message); }
}

async function deleteCategory(id) {
  if (CATEGORIES.length<=1) return alert('カテゴリは最低1つ必要です');
  let used;
  try { used = await db.collection('posts').where('cat','==',id).get(); }
  catch(e){ return alert('確認に失敗しました: '+e.message); }
  const remaining = CATEGORIES.filter(c=>c.id!==id);
  const fallback  = remaining[0].id;
  let msg = `カテゴリ「${catLabel(id)}」を削除しますか？`;
  if (used.size>0) msg += `\n\nこのカテゴリの投稿が${used.size}件あります。削除後は「${catLabel(fallback)}」へ移動します。`;
  if (!confirm(msg)) return;
  try {
    if (used.size>0) {
      const batch = db.batch();
      used.docs.forEach(doc=>batch.update(doc.ref,{cat:fallback}));
      await batch.commit();
    }
    CATEGORIES = remaining; rebuildCatMaps();
    await saveCategories();
    if (selCat===id) selCat=fallback;
    renderNewPostForm();
  } catch(e) { alert('削除に失敗しました: '+e.message); }
}

async function saveCategories() {
  await db.collection('config').doc('board').set({categories:CATEGORIES}, {merge:true});
}

async function startEditPost(id) {
  try {
    const snap = await db.collection('posts').doc(id).get();
    if (!snap.exists) return alert('投稿が見つかりません');
    const p = snap.data();
    if (!(myRole==='admin' || p.authorUid===adminUser.uid)) return alert('この投稿を編集する権限がありません');
    editingPostId = id;
    selCat       = p.cat || CATEGORIES[0].id;
    fileEntries  = (p.files||[]).map(f=>({...f}));
    bnEntries    = (p.backNumbers||[]).map(b=>({...b}));
    editDraft    = { title:p.title||'', body:p.body||'', pin:!!p.pinned, targetDept:p.targetDept||'' };
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab==='new'));
    ['tabPosts','tabNew','tabUsers','tabDms','tabSettings'].forEach(t=>$(t).style.display='none');
    $('tabNew').style.display='';
    if (_postListenerUnsubscribe){ _postListenerUnsubscribe(); _postListenerUnsubscribe=null; }
    renderNewPostForm();
    window.scrollTo(0,0);
  } catch(e) { alert('読み込みエラー: '+e.message); }
}

async function deletePost(id) {
  if (!confirm('この投稿を削除しますか？\nこの操作は元に戻せません。')) return;
  try {
    await db.collection('posts').doc(id).delete();
    // 紐づく問い合わせスレッドも削除（管理者のみ）
    if (myRole==='admin') {
      const ts = await db.collection('threads').where('postId','==',id).get();
      if (ts.size>0) { const b=db.batch(); ts.docs.forEach(d=>b.delete(d.ref)); await b.commit(); }
    }
    if (myRole==='admin') updateBadges();
  } catch(e) { alert('削除に失敗しました: '+e.message); }
}

async function submitPost() {
  hideErr('postErr');
  const title=v('fTitle'), body=v('fBody'), pin=$('fPin').checked;
  const notify = $('fNotify') ? $('fNotify').checked : false;
  const targetDept = $('fTargetDept') ? $('fTargetDept').value : '';
  if (!title||!body) return showErr('postErr','タイトルと本文を入力してください');
  // 投稿者（簡易モード）は割り当てられた部署のみ。全社・他部署は不可
  if (myRole!=='admin') {
    const allowed = adminUser.postDepts||[];
    if (!targetDept || !allowed.includes(targetDept)) {
      return showErr('postErr','投稿できる対象部署を選んでください');
    }
  }
  const isEdit = !!editingPostId;
  const btn=$('postSubmitBtn'); btn.disabled=true; btn.textContent= isEdit?'更新中...':'投稿中...';
  try {
    if (isEdit) {
      const upd = {
        cat:selCat, title, body, pinned:pin, targetDept,
        files:[...fileEntries], backNumbers:[...bnEntries],
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      if ($('fResetRead') && $('fResetRead').checked) upd.readBy = [];
      await db.collection('posts').doc(editingPostId).update(upd);
      if (notify) await notifyNewPost({ cat:selCat, title, body, pinned:pin, targetDept });
      editingPostId = null; editDraft = null;
      alert('更新しました！');
    } else {
      await db.collection('posts').add({
        cat:selCat, title, body, pinned:pin, targetDept,
        files:[...fileEntries], backNumbers:[...bnEntries],
        readBy:[],
        authorUid: adminUser.uid, authorName: adminUser.name||'', authorDept: adminUser.dept||'',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      if (notify) await notifyNewPost({ cat:selCat, title, body, pinned:pin, targetDept });
      if (selCat === 'event') {
        if (confirm(`「${title}」をOutlookカレンダーに追加しますか？`)) downloadICS(title, body);
      } else {
        alert('投稿しました！');
      }
    }
    document.querySelector('[data-tab="posts"]').click();
  } catch(e) {
    btn.disabled=false; btn.textContent= isEdit?'更新する':'投稿する';
    showErr('postErr',(isEdit?'更新':'投稿')+'に失敗しました: '+e.message);
  }
}

/* ─── 新規投稿の通知（Webhook → Power Automateで全員メール等）─── */
function getNotifyWebhook() {
  return localStorage.getItem('notify_webhook_url') || localStorage.getItem('teams_webhook_url') || '';
}
async function notifyNewPost(post) {
  const webhookUrl = getNotifyWebhook();
  if (!webhookUrl) return;
  const catName = catLabel(post.cat);
  const dateStr = new Date().toLocaleDateString('ja-JP');
  const titleLine = post.pinned ? `📌 ${post.title}` : post.title;
  const target = post.targetDept ? `${post.targetDept}向け` : '全社';
  const text =
`神村電機工業 社内掲示板に新しい投稿があります。

【${catName}】${titleLine}
対象：${target}
投稿日：${dateStr}

${post.body||''}

— 社内掲示板アプリで全文をご確認ください。`;
  const payload = {
    type: 'new_post',
    title: post.title,
    titleLine,
    category: catName,
    target,
    targetDept: post.targetDept || '',
    date: dateStr,
    pinned: !!post.pinned,
    body: post.body || '',
    text
  };
  try {
    await fetch(webhookUrl, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
  } catch(e) {
    console.warn('通知Webhookの送信に失敗しました:', e);
  }
}

/* ─── Outlookカレンダー(.ics)生成 ─── */
function generateICS(title, description) {
  const now    = new Date();
  const stamp  = now.toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const dtDate = now.toISOString().slice(0,10).replace(/-/g,'');
  const uid    = `kamimura-board-${Date.now()}@kamimura.co.jp`;
  const desc   = (description||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').substring(0,500);
  return [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//神村電機工業//掲示板//JA',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTAMP:${stamp}`,
    `DTSTART;VALUE=DATE:${dtDate}`,
    `DTEND;VALUE=DATE:${dtDate}`,
    `SUMMARY:${title}`,
    `DESCRIPTION:${desc}`,
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');
}

function downloadICS(title, description) {
  const ics  = generateICS(title, description);
  const blob = new Blob([ics], { type:'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${title}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('カレンダーファイルをダウンロードしました。\nOutlookで開くと予定が追加されます。');
}

function saveTeamsWebhook() {
  const url = v('sTeamsUrl');
  if (url && !url.startsWith('https://')) {
    showTeamsMsg('URLが正しくありません（https:// で始まるURLを入力してください）', 'red');
    return;
  }
  localStorage.setItem('notify_webhook_url', url);
  localStorage.removeItem('teams_webhook_url'); // 旧キーは整理
  showTeamsMsg(url ? '保存しました。次回の投稿で「通知する」にチェックすると送信されます。' : 'URLを削除しました。', 'green');
  setTimeout(renderSettingsPanel, 1200);
}

function clearTeamsWebhook() {
  localStorage.removeItem('notify_webhook_url');
  localStorage.removeItem('teams_webhook_url');
  renderSettingsPanel();
}

function showTeamsMsg(msg, color) {
  const el = $('teamsMsg');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color === 'red' ? 'var(--red)' : 'var(--green)';
  el.style.display = 'block';
}

function saveEmailJS() {
  const si = v('sEjsService'), ti = v('sEjsTemplate'), pk = v('sEjsKey');
  if (si) localStorage.setItem('emailjs_service_id',  si);
  if (ti) localStorage.setItem('emailjs_template_id', ti);
  if (pk) localStorage.setItem('emailjs_public_key',  pk);
  const el = $('ejsMsg');
  if (el) { el.textContent='保存しました'; el.style.color='var(--green)'; el.style.display='block'; }
  setTimeout(renderSettingsPanel, 1000);
}
function clearEmailJS() {
  ['emailjs_service_id','emailjs_template_id','emailjs_public_key'].forEach(k=>localStorage.removeItem(k));
  renderSettingsPanel();
}

async function savePostPerm(uid) {
  const allow = $(`cp_${uid}`)?.checked === true;
  const depts = DEPTS.filter((d,i)=>$(`pd_${uid}_${i}`)?.checked);
  if (allow && depts.length === 0) {
    return alert('対象部署を1つ以上選んでください。\n（許可しない場合は「投稿を許可する」のチェックを外してください）');
  }
  try {
    await db.collection('users').doc(uid).update({
      canPost: allow,
      postDepts: allow ? depts : []
    });
    const m=$(`ppMsg_${uid}`); if(m){ m.style.display='inline'; setTimeout(()=>m.style.display='none',1500); }
  } catch(e) { alert('保存に失敗しました: '+e.message); }
}

async function loadUserList() {
  $('userList').innerHTML='<div class="loading-msg">読み込み中...</div>';
  try {
    const snap=await db.collection('users').get();
    let users=snap.docs.map(d=>({uid:d.id,...d.data()}));
    if (ufCurrent!=='all') users=users.filter(u=>u.status===ufCurrent);
    users.sort((a,b)=>a.status==='pending'?-1:b.status==='pending'?1:0);
    if (!users.length){ $('userList').innerHTML='<div class="empty-state">該当するユーザーはいません</div>'; return; }
    $('userList').innerHTML=users.map(u=>{
      const permBadge = (u.status==='approved' && u.canPost)
        ? `<span class="user-status-badge" style="background:var(--accent-l);color:var(--accent);margin-left:6px;">投稿可：${(u.postDepts||[]).map(esc).join('・')||'—'}</span>` : '';
      return `
      <div class="user-card${u.status==='pending'?' pending':''}">
        <div class="user-info">
          <div class="user-avatar" style="background:${avColor(u.name)}">${u.name.charAt(0)}</div>
          <div style="flex:1;min-width:0;"><div class="user-name">${esc(u.name)}</div><div class="user-detail">${esc(u.dept)} ・ ${esc(u.email||'')}</div></div>
          <div class="user-status-badge ${u.status==='approved'?'st-approved':u.status==='pending'?'st-pending':'st-rejected'}">
            ${u.status==='approved'?'承認済み':u.status==='pending'?'承認待ち':'否認'}
          </div>
        </div>
        ${permBadge?`<div style="padding:0 14px 4px;">${permBadge}</div>`:''}
        <div class="user-actions">
          ${u.status==='pending'?`<button class="btn-approve" onclick="setUserStatus('${u.uid}','approved')">✓ 承認する</button><button class="btn-reject" onclick="setUserStatus('${u.uid}','rejected')">✗ 否認する</button>`:''}
          ${u.status==='approved'?`<button class="btn-revoke" onclick="setUserStatus('${u.uid}','rejected')">アクセス取り消し</button>`:''}
          ${u.status==='rejected'?`<button class="btn-approve" onclick="setUserStatus('${u.uid}','approved')">✓ 承認に変更</button>`:''}

async function setUserStatus(uid, status) {

async function deleteUser(uid, name) {
  if (!confirm(`「${name}」のデータを削除しますか？\nこの操作は元に戻せません。`)) return;
  try {
    await db.collection('users').doc(uid).delete();
    loadUserList();

}

/* ─── DM Panel (Admin) ─── */
let _dmByPost  = {};
let _dmPostMap = {};

async function loadDMPanel() {
  const panel = $('dmPanel');
  panel.innerHTML = '<div class="loading-msg">読み込み中...</div>';
  try {
    const [tSnap, pSnap] = await Promise.all([
      db.collection('threads').orderBy('updatedAt','desc').get(),
      db.collection('posts').get()
    ]);
    _dmPostMap = {};
    pSnap.docs.forEach(d => { _dmPostMap[d.id] = { id:d.id, ...d.data() }; });
    _dmByPost = {};
    tSnap.docs.forEach(d => {
      const t = { id:d.id, ...d.data() };
      if (!_dmPostMap[t.postId]) return;
      if (!_dmByPost[t.postId]) _dmByPost[t.postId] = [];
      _dmByPost[t.postId].push(t);
    });
    const postIds = Object.keys(_dmByPost);
    if (!postIds.length) {
      panel.innerHTML = '<div class="empty-state" style="padding:40px 20px;">問い合わせはまだありません</div>';
      return;
    }
    if (!activeDmPost || !_dmByPost[activeDmPost]) activeDmPost = postIds[0];
    if (!activeDmUserId || !_dmByPost[activeDmPost].find(t=>t.userId===activeDmUserId)) {
      activeDmUserId = _dmByPost[activeDmPost][0].userId;
    }
    renderDMPanel();
  } catch(e) {
    panel.innerHTML = `<div class="empty-state">読み込みエラー: ${e.message}</div>`;
  }
}

function renderDMPanel() {
  const postIds = Object.keys(_dmByPost);
  const postListHTML = postIds.map(pid => {
    const threads = _dmByPost[pid];
    const hasNew  = threads.some(t => {
      const msgs = t.messages || [];
      return !t.resolved && msgs.length && msgs[msgs.length-1].from === 'user';
    });
    return `
      <div class="dm-post-item${activeDmPost===pid?' active':''}" onclick="selectDmPost('${pid}')">
        <div style="flex:1;min-width:0;">
          <div class="dm-pname">${esc(_dmPostMap[pid]?.title||'(削除済み)')}</div>
          <div class="dm-sub">${threads.length}件の問い合わせ</div>
        </div>
        ${hasNew?'<span style="width:8px;height:8px;background:var(--red);border-radius:50%;flex-shrink:0;"></span>':''}
      </div>`;
  }).join('');
  $('dmPanel').innerHTML = `
    <div class="dm-post-list">${postListHTML}</div>
    <div class="dm-win" id="dmWin"></div>`;
  renderDMWin();
}

function selectDmPost(postId) {
  activeDmPost = postId;
  activeDmUserId = _dmByPost[postId][0].userId;
  renderDMPanel();
}

function selectDmUser(userId) {
  activeDmUserId = userId;
  renderDMWin();
}

function renderDMWin() {
  const win = $('dmWin');
  if (!win) return;
  const threads   = _dmByPost[activeDmPost] || [];
  const thread    = threads.find(t => t.userId === activeDmUserId) || threads[0];
  if (!thread) { win.innerHTML = '<div class="empty-state">スレッドなし</div>'; return; }
  const msgs       = thread.messages || [];
  const isResolved = !!thread.resolved;

  const userTabsHTML = threads.map(t => {
    const tm = t.messages || [];
    const hasNew = !t.resolved && tm.length && tm[tm.length-1].from === 'user';
    return `
      <button class="dm-utab${activeDmUserId===t.userId?' active':''}" onclick="selectDmUser('${t.userId}')">
        ${esc(t.userName||t.userId)}
        ${hasNew?'<span style="display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin-left:4px;vertical-align:middle;"></span>':''}
      </button>`;
  }).join('');

  const msgsHTML = msgs.length
    ? msgs.map(m => `
        <div class="dm-bbl ${m.from==='user'?'user':'admin'}">
          <div class="dm-bbl-who">${m.from==='user'?esc(thread.userName||'社員'):'管理者'}</div>
          <div class="dm-bbl-text">${esc(m.text)}</div>
          <div class="dm-bbl-time">${m.time||''}</div>
        </div>`).join('')
    : '<div style="text-align:center;font-size:12px;color:var(--text3);padding:16px 0;">メッセージはありません</div>';

  win.innerHTML = `
    <div class="dm-win-head">
      <div style="font-size:11px;color:var(--text2);margin-bottom:2px;">問い合わせ内容</div>
      <div style="font-size:14px;font-weight:700;line-height:1.4;">${esc(_dmPostMap[activeDmPost]?.title||'')}</div>
      ${isResolved?'<div style="font-size:11px;color:var(--green);margin-top:4px;">✓ 解決済み</div>':''}
    </div>
    <div class="dm-user-tabs">${userTabsHTML}</div>
    <div class="dm-thread" id="adminDmThread">${msgsHTML}</div>
    <div class="dm-reply-row">
      <textarea class="dm-reply-input" id="adminDmInput" rows="1"
        placeholder="${isResolved?'（解決済み）返信するには解決を取り消してください':'返信内容を入力…'}"
        ${isResolved?'disabled':''}
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
      <button class="dm-reply-btn" id="adminDmSendBtn" onclick="sendAdminReply('${thread.id}')" ${isResolved?'disabled':''}>➤</button>
    </div>
    <div style="display:flex;gap:8px;padding:8px 12px 12px;border-top:1px solid var(--border);">
      <button onclick="toggleResolved('${thread.id}',${isResolved})"
        style="flex:1;padding:7px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;
        ${isResolved?'background:var(--surface2);color:var(--text2);border-color:var(--border2);':'background:var(--green-l);color:var(--green);border-color:var(--green);'}">
        ${isResolved?'✎ 解決を取り消す':'✓ 解決済みにする'}
      </button>
      <button onclick="deleteThread('${thread.id}')"
        style="padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--red);cursor:pointer;font-family:inherit;background:white;color:var(--red);">
        🗑 削除
      </button>
    </div>`;

  const threadEl = $('adminDmThread');
  if (threadEl) threadEl.scrollTop = threadEl.scrollHeight;
}

async function sendAdminReply(threadId) {
  const input = $('adminDmInput');
  const text  = input?.value?.trim();
  if (!text) return;
  const btn = $('adminDmSendBtn');
  if (btn) btn.disabled = true;
  const msg = { from:'admin', text, time:nowStr() };
  try {
    await db.collection('threads').doc(threadId).update({
      messages: firebase.firestore.FieldValue.arrayUnion(msg),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    const thread = Object.values(_dmByPost).flat().find(t => t.id === threadId);
    if (thread) thread.messages = [...(thread.messages||[]), msg];
    if (input) { input.value = ''; input.style.height = ''; }
    renderDMWin();
    updateBadges();
  } catch(e) { alert('送信に失敗しました: ' + e.message); }
  if (btn) btn.disabled = false;
}

async function toggleResolved(threadId, currentlyResolved) {
  try {
    await db.collection('threads').doc(threadId).update({
      resolved: !currentlyResolved,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    const thread = Object.values(_dmByPost).flat().find(t => t.id === threadId);
    if (thread) thread.resolved = !currentlyResolved;
    renderDMWin();
    updateBadges();
  } catch(e) { alert('更新に失敗しました'); }
}

async function deleteThread(threadId) {
  if (!confirm('この問い合わせスレッドを削除しますか？\nテスト用のやり取りなどを完全に消去します。元に戻せません。')) return;
  try {
    await db.collection('threads').doc(threadId).delete();
    // ローカルキャッシュからも除去
    Object.keys(_dmByPost).forEach(pid=>{
      _dmByPost[pid] = _dmByPost[pid].filter(t=>t.id!==threadId);
      if (!_dmByPost[pid].length) delete _dmByPost[pid];
    });
    activeDmUserId = null;
    if (!_dmByPost[activeDmPost]) activeDmPost = Object.keys(_dmByPost)[0] || null;
    if (activeDmPost) {
      activeDmUserId = _dmByPost[activeDmPost][0]?.userId || null;
      renderDMPanel();
    } else {
      $('dmPanel').innerHTML = '<div class="empty-state" style="padding:40px 20px;">問い合わせはまだありません</div>';
    }
    updateBadges();
  } catch(e) { alert('削除に失敗しました: '+e.message); }
}

function goToDM(postId) {
  activeDmPost = postId;
  activeDmUserId = null;
  document.querySelector('[data-tab="dms"]').click();
}

</script>
</body>
</html>
